<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gênese — Documentação das Ferramentas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Spline+Sans+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #F1ECE2;
  --paper-2: #E8E1D3;
  --card: #FCFAF4;
  --ink: #2B2926;
  --ink-soft: #6B655B;
  --line: #2B2926;
  --line-soft: #B9B0A0;
  --influencia: #8C5BAA;
  --vida: #2F6F62;
  --tensao: #C0563A;
  --recurso: #B8862F;
  --fe: #7C4DBE;
  --info: #3E6B8C;
  --hand: 'Architects Daughter', cursive;
  --ui: 'Inter', system-ui, sans-serif;
  --mono: 'Spline Sans Mono', monospace;
  --radius: 10px 7px 11px 6px;
  --shadow: 3px 4px 0 rgba(43,41,38,.14);
  --rail-w: 272px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--ui);
  color: var(--ink);
  background: var(--paper);
  background-image: radial-gradient(var(--line-soft) .6px, transparent .6px);
  background-size: 22px 22px;
  -webkit-font-smoothing: antialiased;
}

/* ---- Shell ---- */
.app { display: flex; min-height: 100vh; }
.rail {
  width: var(--rail-w); flex: 0 0 var(--rail-w);
  position: sticky; top: 0; align-self: flex-start;
  height: 100vh; overflow-y: auto;
  background: var(--paper-2);
  border-right: 2px solid var(--line);
  padding: 20px 16px 48px;
  scrollbar-width: thin;
}
.rail h1 { font-family: var(--hand); font-size: 28px; line-height: 1; margin: 4px 6px 2px; }
.rail .sub { font-family: var(--mono); font-size: 10px; color: var(--ink-soft); margin: 0 6px 16px; text-transform: uppercase; letter-spacing: 1.5px; }
.grp-label { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-soft); margin: 18px 6px 7px; display: block; }
.nav-item {
  display: flex; align-items: center; gap: 9px; width: 100%; text-align: left;
  background: transparent; border: 1.5px solid transparent; border-radius: 8px 6px 9px 5px;
  padding: 7px 10px; margin-bottom: 3px; cursor: pointer;
  font-family: var(--ui); font-size: 13px; font-weight: 500; color: var(--ink);
}
.nav-item:hover { background: #0000000a; }
.nav-item.active { background: var(--card); border-color: var(--line); box-shadow: 2px 2px 0 rgba(43,41,38,.13); }
.nav-item .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
.nav-item .num { font-family: var(--mono); font-size: 10px; color: var(--ink-soft); margin-left: auto; }

.stage { flex: 1 1 auto; min-width: 0; padding: 40px 44px 100px; max-width: 1200px; margin: 0 auto; }

.topbar { display: none; }
@media (max-width: 900px) {
  .app { flex-direction: column; }
  .rail { display: none; }
  .topbar { display: flex; gap: 10px; align-items: center; position: sticky; top: 0; z-index: 30; background: var(--paper-2); border-bottom: 2px solid var(--line); padding: 10px 14px; }
  .topbar .brand { font-family: var(--hand); font-size: 22px; }
  .topbar select { flex: 1; font-size: 14px; padding: 8px 10px; border: 2px solid var(--line); border-radius: 8px; background: var(--card); }
  .stage { padding: 22px 18px 80px; }
}

/* ---- Section ---- */
.sec { animation: fade .2s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }

.sec-head { margin-bottom: 28px; border-bottom: 2.5px dashed var(--line-soft); padding-bottom: 16px; }
.sec-head .eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--influencia); font-weight: 600; }
.sec-head h2 { font-family: var(--hand); font-size: 44px; line-height: 1.02; margin: 4px 0 10px; }
.sec-head p { margin: 0; max-width: 68ch; color: var(--ink-soft); font-size: 14.5px; line-height: 1.65; }
.sec-head .refs { font-family: var(--mono); font-size: 11px; color: var(--ink-soft); margin-top: 10px; }

/* ---- Blocks ---- */
.block { margin: 34px 0; }
.block > h3 { font-family: var(--hand); font-size: 26px; margin: 0 0 6px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.block > .desc { margin: 0 0 16px; color: var(--ink-soft); font-size: 13.5px; max-width: 72ch; line-height: 1.6; }

/* ---- Info cards ---- */
.card-grid { display: grid; gap: 16px; }
.c2 { grid-template-columns: repeat(2, 1fr); }
.c3 { grid-template-columns: repeat(3, 1fr); }
@media (max-width: 780px) { .c2, .c3 { grid-template-columns: 1fr; } }

.card {
  border: 2px solid var(--line); border-radius: var(--radius);
  background: var(--card); box-shadow: var(--shadow); padding: 18px 20px; overflow: hidden;
}
.card-title { font-family: var(--hand); font-size: 20px; margin: 0 0 7px; line-height: 1.1; }
.card-body { font-size: 13.5px; line-height: 1.65; color: var(--ink-soft); }
.card-body strong { color: var(--ink); }
.card-body p { margin: 0 0 10px; }
.card-body p:last-child { margin-bottom: 0; }
.card-tag { display: inline-block; font-family: var(--mono); font-size: 9.5px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; border: 1.5px solid; margin-bottom: 10px; }
.tag-assets { background: #D4E5DF; border-color: var(--vida); color: #1c4d42; }
.tag-wf { background: #E7DBF0; border-color: var(--influencia); color: #4a2075; }
.tag-ref { background: #D6E2EC; border-color: var(--info); color: #234a63; }

/* ---- Step list ---- */
.steps { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 14px; }
.steps li { display: flex; gap: 14px; align-items: flex-start; font-size: 13.5px; line-height: 1.6; }
.step-num {
  flex: 0 0 auto; width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--line);
  background: var(--card); font-family: var(--mono); font-size: 11px; font-weight: 600;
  display: grid; place-items: center; color: var(--influencia); box-shadow: 2px 2px 0 rgba(43,41,38,.12);
}
.step-body { padding-top: 3px; }
.step-body strong { color: var(--ink); }
.step-body .sub-note { font-family: var(--mono); font-size: 11px; color: var(--ink-soft); margin-top: 4px; }

/* ---- Feature list (tabela) ---- */
.feat-table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
.feat-table th { font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-soft); font-weight: 600; text-align: left; padding: 6px 12px; border-bottom: 2px solid var(--line); }
.feat-table td { padding: 11px 12px; border-bottom: 1.5px solid var(--line-soft); vertical-align: top; line-height: 1.5; }
.feat-table tr:last-child td { border-bottom: none; }
.feat-table tr:hover td { background: #0000000a; }
.feat-table td:first-child { font-weight: 600; white-space: nowrap; }
.feat-table .mono { font-family: var(--mono); font-size: 11.5px; color: var(--info); }

/* ---- Annotation ---- */
.annot {
  font-family: var(--hand); font-size: 15.5px; color: var(--ink); line-height: 1.4;
  background: #FFF8D9; border: 1.5px solid #D8C98A; border-radius: 9px 6px 10px 5px;
  padding: 12px 15px; box-shadow: 2px 3px 0 rgba(43,41,38,.1); margin: 14px 0;
}
.annot::before { content: "✎ "; opacity: .6; }
.annot.tip { background: #E7DBF0; border-color: #bfa3d6; }
.annot.tip::before { content: "☞ "; }
.annot.warn { background: #F0D8CF; border-color: #d4936b; }
.annot.warn::before { content: "⚠ "; }

/* ---- Color swatch row ---- */
.palette { display: flex; gap: 0; border: 2px solid var(--line); border-radius: 10px; overflow: hidden; margin: 14px 0; }
.swatch { flex: 1; display: flex; flex-direction: column; }
.swatch-color { height: 54px; }
.swatch-label { padding: 7px 9px; background: var(--card); font-family: var(--mono); font-size: 10px; line-height: 1.35; border-top: 1.5px solid var(--line); }
.swatch-label .nm { font-weight: 600; color: var(--ink); }
.swatch-label .hex { color: var(--ink-soft); }

/* ---- Section list (feature bullets) ---- */
.sec-list { list-style: none; padding: 0; margin: 14px 0; display: flex; flex-direction: column; gap: 10px; }
.sec-list li { display: flex; gap: 10px; align-items: baseline; font-size: 13.5px; line-height: 1.6; }
.sec-list li::before { content: "✦"; font-size: 11px; color: var(--influencia); flex: 0 0 auto; margin-top: 2px; }
.sec-list .label { font-weight: 600; min-width: 180px; }

/* ---- Nav index cards (para visão geral) ---- */
.index-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 13px; }
@media (max-width: 860px) { .index-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 520px) { .index-grid { grid-template-columns: 1fr; } }
.index-card {
  border: 2px solid var(--line); border-radius: var(--radius); background: var(--card);
  box-shadow: var(--shadow); padding: 14px 16px; cursor: default;
  display: flex; flex-direction: column; gap: 5px;
}
.index-card .ic-eyebrow { font-family: var(--mono); font-size: 9.5px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-soft); }
.index-card .ic-title { font-family: var(--hand); font-size: 18px; line-height: 1.1; }
.index-card .ic-desc { font-size: 12px; color: var(--ink-soft); line-height: 1.5; margin-top: 3px; }
.index-card .ic-dot { width: 10px; height: 10px; border-radius: 50%; margin-bottom: 4px; }

/* ---- Controle diagram ---- */
.control-row { display: flex; align-items: stretch; gap: 12px; margin: 16px 0; flex-wrap: wrap; }
.control-box {
  flex: 1 1 180px; border: 2px solid var(--line); border-radius: var(--radius);
  background: var(--card); box-shadow: var(--shadow); padding: 14px 16px;
}
.control-box .cb-label { font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 6px; }
.control-box .cb-name { font-family: var(--hand); font-size: 20px; line-height: 1.1; margin-bottom: 6px; }
.control-box .cb-desc { font-size: 12.5px; color: var(--ink-soft); line-height: 1.5; }

/* ---- Code snippet ---- */
.code-block { background: #231C30; border: 2px solid var(--line); border-radius: 10px; padding: 18px 22px; font-family: var(--mono); font-size: 12.5px; line-height: 1.7; color: #EFE9F4; overflow-x: auto; margin: 14px 0; }
.code-block .k { color: #C9A86A; }
.code-block .s { color: #7FB29E; }
.code-block .c { color: #8C5BAA; }

/* ---- Tweaks preview ---- */
.tw-preview { border: 2px solid var(--line); border-radius: var(--radius); background: var(--card); box-shadow: var(--shadow); max-width: 280px; overflow: hidden; }
.tw-preview .tw-head { display: flex; align-items: center; justify-content: space-between; padding: 9px 13px; border-bottom: 2px solid var(--line); background: var(--paper-2); font-family: var(--hand); font-size: 20px; }
.tw-preview .tw-body { padding: 12px 13px; }
.tw-preview .tw-sec { font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-soft); margin: 12px 0 6px; }
.tw-preview .tw-seg { display: flex; gap: 5px; }
.tw-preview .tw-seg span { flex: 1; text-align: center; font-size: 11.5px; padding: 6px 4px; border: 1.5px solid var(--line); border-radius: 6px; background: var(--card); font-family: var(--ui); }
.tw-preview .tw-seg span.on { background: var(--influencia); color: #fff; border-color: var(--influencia); }

/* ---- Glossary ---- */
.gloss-row { display: grid; grid-template-columns: 64px 1fr; gap: 10px 20px; align-items: baseline; margin: 10px 0; font-size: 13.5px; line-height: 1.6; }
.gloss-key { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--info); padding: 2px 8px; background: #D6E2EC; border: 1.5px solid var(--info); border-radius: 5px; text-align: center; }
.gloss-val strong { color: var(--ink); }
.gloss-val { color: var(--ink-soft); }

/* ---- Footer ---- */
.foot { margin-top: 56px; border-top: 2px dashed var(--line-soft); padding-top: 14px; font-family: var(--mono); font-size: 11px; color: var(--ink-soft); line-height: 1.7; }

/* ---- Divider ---- */
.divider { border: none; border-top: 2px dashed var(--line-soft); margin: 36px 0; }

/* ---- Keyboard shortcut ---- */
.kbd { font-family: var(--mono); font-size: 11px; border: 1.5px solid var(--line); border-radius: 5px; padding: 1px 6px; background: var(--card); box-shadow: 0 2px 0 rgba(43,41,38,.15); }

/* ---- Inline tag ---- */
.tag { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; padding: 2px 7px; border-radius: 20px; border: 1.5px solid; display: inline-block; line-height: 1.4; }
.tag-p0 { background: #F0D8CF; border-color: var(--tensao); color: #7e2f1c; }
.tag-p1 { background: #F0E4C8; border-color: var(--recurso); color: #6e4f12; }
.tag-p2 { background: #E4D8F2; border-color: var(--fe); color: #3d1f6b; }

/* ---- Highlight bar ---- */
.highlight { border-left: 4px solid var(--influencia); padding: 12px 16px; background: #E7DBF020; border-radius: 0 8px 8px 0; margin: 16px 0; font-size: 13.5px; line-height: 1.65; }
.highlight strong { color: var(--ink); }

/* ---- Creature param grid ---- */
.param-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin: 14px 0; }
.param-item { border: 1.5px solid var(--line-soft); border-radius: 8px; background: var(--card); padding: 10px 12px; font-size: 12.5px; }
.param-item .pname { font-family: var(--mono); font-size: 10px; color: var(--ink-soft); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 3px; }
.param-item .popts { font-size: 12px; color: var(--ink); line-height: 1.4; }

</style>
</head>
<body>

<div class="topbar">
  <span class="brand">Gênese</span>
  <select id="mobileSel" aria-label="Selecionar seção"></select>
</div>

<div class="app">
  <nav class="rail" id="rail"></nav>
  <main class="stage" id="stage"></main>
</div>

<script>
const SECTIONS = [
  /* Visão Geral */
  { id:'intro',       group:'Início',             title:'Sobre este documento',    dot:'#8C5BAA' },
  { id:'relacao',     group:'Início',             title:'Como as ferramentas se relacionam', dot:'#2F6F62' },
  /* Biblioteca */
  { id:'lib-nav',     group:'Biblioteca de Assets', title:'Navegação',             dot:'#3E6B8C' },
  { id:'lib-cores',   group:'Biblioteca de Assets', title:'Cores & Tokens',        dot:'#C0563A' },
  { id:'lib-icones',  group:'Biblioteca de Assets', title:'Ícones',                dot:'#3E6B8C' },
  { id:'lib-criatura',group:'Biblioteca de Assets', title:'Criatura paramétrica',  dot:'#2F6F62' },
  { id:'lib-escrita', group:'Biblioteca de Assets', title:'Escrita procedural',    dot:'#7C4DBE' },
  { id:'lib-efeitos', group:'Biblioteca de Assets', title:'Efeitos & partículas',  dot:'#5FE0C2' },
  { id:'lib-flora',   group:'Biblioteca de Assets', title:'Biomas — Flora & Props',dot:'#56A06A' },
  { id:'lib-bld',     group:'Biblioteca de Assets', title:'Construções modulares', dot:'#C9A86A' },
  { id:'lib-marca',   group:'Biblioteca de Assets', title:'Marca & Molduras',      dot:'#8C5BAA' },
  { id:'lib-destino', group:'Biblioteca de Assets', title:'Cartões de Destino',    dot:'#B8862F' },
  { id:'lib-unity',   group:'Biblioteca de Assets', title:'Exportar / Unity',      dot:'#3E6B8C' },
  /* Wireframes */
  { id:'wf-nav',      group:'Wireframes',         title:'Navegação & Tweaks',      dot:'#8C5BAA' },
  { id:'wf-hud',      group:'Wireframes',         title:'Mundo Vivo (HUD)',        dot:'#8C5BAA' },
  { id:'wf-influencia',group:'Wireframes',        title:'Tela de Influência',      dot:'#8C5BAA' },
  { id:'wf-civ',      group:'Wireframes',         title:'Painel da Civilização',   dot:'#3E6B8C' },
  { id:'wf-ficha',    group:'Wireframes',         title:'Ficha de Figura',         dot:'#3E6B8C' },
  { id:'wf-codice',   group:'Wireframes',         title:'Códice Cultural',         dot:'#7C4DBE' },
  { id:'wf-mapa',     group:'Wireframes',         title:'Mapa + Overlays',         dot:'#3E6B8C' },
  { id:'wf-cronica',  group:'Wireframes',         title:'Crônica',                 dot:'#7C4DBE' },
  { id:'wf-assets',   group:'Wireframes',         title:'Folhas de Assets de Arte',dot:'#2F6F62' },
  { id:'wf-meta',     group:'Wireframes',         title:'Meta, Loja & Onboarding', dot:'#B8862F' },
  /* Referência */
  { id:'glossario',   group:'Referência',         title:'Glossário de siglas',     dot:'#8A8377' },
];

const byId = Object.fromEntries(SECTIONS.map(s => [s.id, s]));

// -------------------------------------------------------
// CONTENT BUILDERS
// -------------------------------------------------------

function buildIntro() {
  return `
  <div class="sec-head">
    <div class="eyebrow">DOCUMENTAÇÃO · v1.0 · Junho 2026</div>
    <h2>Sobre este documento</h2>
    <p>Guia de uso das duas ferramentas interativas de design do projeto Gênese. Explica o que cada ferramenta faz, como navegar, como usar cada seção e como integrar o resultado no pipeline do projeto.</p>
  </div>

  <div class="block">
    <h3>Duas ferramentas, um projeto</h3>
    <p class="desc">O design de Gênese é suportado por duas ferramentas complementares, abertas no navegador — sem instalação, sem dependências externas.</p>
    <div class="card-grid c2">
      <div class="card">
        <span class="card-tag tag-assets">Biblioteca de Assets</span>
        <div class="card-title">Gênese — Biblioteca de Assets</div>
        <div class="card-body">
          <p>A <strong>fonte de verdade visual do projeto</strong>. Contém todos os assets vetoriais produzidos — ícones, criatura paramétrica, glifos, marca, molduras, flora, construções — além dos tokens de cor e guias de exportação para Unity/C#.</p>
          <p>Use-a para <strong>consultar, explorar e exportar</strong> assets finais (ou próximos do final).</p>
        </div>
      </div>
      <div class="card">
        <span class="card-tag tag-wf">Wireframes</span>
        <div class="card-title">Gênese — Wireframes</div>
        <div class="card-body">
          <p>O <strong>mapa de telas e produção de arte</strong> do jogo. Cada folha descreve uma tela de UI ou uma família de assets, com placeholders tracejados, anotações, checklists de entregas e paletas semânticas.</p>
          <p>Use-a para <strong>planejar, revisar e rastrear</strong> o que ainda precisa ser produzido.</p>
        </div>
      </div>
    </div>
  </div>

  <div class="block">
    <h3>Como acessar</h3>
    <ul class="steps">
      <li><span class="step-num">1</span><div class="step-body"><strong>Abra o arquivo HTML no navegador</strong> — qualquer navegador moderno (Chrome, Firefox, Safari, Edge). Não é necessário servidor; basta abrir o arquivo local ou usar o preview do editor.<div class="sub-note">genese-assets/Gênese - Biblioteca de Assets.html · genese-wireframes/Gênese - Wireframes.html</div></div></li>
      <li><span class="step-num">2</span><div class="step-body"><strong>Navegue pela barra lateral</strong> à esquerda para trocar de seção. Em telas pequenas (&lt; 880 px), a barra lateral some e aparece um menu dropdown no topo.</div></li>
      <li><span class="step-num">3</span><div class="step-body"><strong>A URL atualiza o hash</strong> (#cores, #criaturas, etc.) — você pode marcar uma seção nos favoritos ou copiar o link direto para uma equipe.</div></li>
    </ul>
  </div>

  <div class="block">
    <h3>Visão geral das seções disponíveis</h3>
    <div class="index-grid">
      ${[
        { dot:'#C0563A', label:'Biblioteca', name:'Cores & Tokens', desc:'Paleta-base + 6 rampas semânticas + arquivo tokens.json' },
        { dot:'#3E6B8C', label:'Biblioteca', name:'Ícones', desc:'Conjunto SVG monocromático, tingível em runtime' },
        { dot:'#2F6F62', label:'Biblioteca', name:'Criatura paramétrica', desc:'Builder interativo com genoma completo (25+ parâmetros)' },
        { dot:'#7C4DBE', label:'Biblioteca', name:'Escrita procedural', desc:'6 culturas de glifos gerados algoritmicamente' },
        { dot:'#5FE0C2', label:'Biblioteca', name:'Efeitos & partículas', desc:'Fogueira, nudge, pulso, raio e 3 módulos de clima' },
        { dot:'#56A06A', label:'Biblioteca', name:'Flora & Props', desc:'Sprites vetoriais por bioma (17 tipos de bioma)' },
        { dot:'#C9A86A', label:'Biblioteca', name:'Construções modulares', desc:'11 estágios × 10 culturas + variante Ruínas' },
        { dot:'#8C5BAA', label:'Biblioteca', name:'Marca & Molduras', desc:'Logotipo, ícone do app e molduras 9-slice para HUD' },
        { dot:'#B8862F', label:'Biblioteca', name:'Cartões de Destino', desc:'7 variantes de tela-resumo compartilhável' },
        { dot:'#8C5BAA', label:'Wireframes', name:'7 telas de UI', desc:'HUD, Influência, Civilização, Ficha, Códice, Mapa, Crônica' },
        { dot:'#2F6F62', label:'Wireframes', name:'4 folhas de assets', desc:'Criaturas, Ambiente, Construções, Ícones & Overlays' },
        { dot:'#B8862F', label:'Wireframes', name:'3 folhas meta', desc:'Escrita procedural, Artefatos, Marca/Loja/Onboarding' },
      ].map(c => `<div class="index-card">
        <div class="ic-dot" style="background:${c.dot}"></div>

function buildLibEscrita() {
  return `
  <div class="sec-head">
    <div class="eyebrow">BIBLIOTECA · Escrita procedural</div>
    <h2>Escrita procedural</h2>
    <p>Cada civilização inventa um sistema de escrita visual próprio — ilegível no início, "traduzível" conforme o jogador aprende a cultura. Os glifos são gerados algoritmicamente a partir de 6 estilos distintos.</p>
    <div class="refs">Arquivo-fonte: <strong>meta-assets.js</strong> — funções <strong>glyphSVG(style, seed)</strong> e <strong>word(style, seed, n)</strong></div>
  </div>

  <div class="block">
    <h3>Os 6 estilos de escrita</h3>
    <table class="feat-table">
      <thead><tr><th>Cultura</th><th>Estilo visual</th><th>Sensação</th></tr></thead>
      <tbody>
        <tr><td>A — Angular</td><td>Traços retos entre nós de uma grade 3×3</td><td>Rígida, gravada em pedra ou metal</td></tr>
        <tr><td>B — Orgânica</td><td>Curvas Bézier contínuas entre os mesmos nós</td><td>Fluida, pintada com pincel</td></tr>
        <tr><td>C — Radial</td><td>Traços irradiam de um centro; arcos entre pontos</td><td>Ritual, solar, cósmica</td></tr>
        <tr><td>D — Rúnica</td><td>Haste vertical com 2–4 ramos diagonais</td><td>Entalhada em madeira ou osso</td></tr>
        <tr><td>E — Cuneiforme</td><td>Cunhas (triângulos) em 4 orientações</td><td>Impressa em barro, contabilidade</td></tr>
        <tr><td>F — Espiral</td><td>Voluta que se abre + traço de saída</td><td>Astronômica, cíclica</td></tr>
      </tbody>
    </table>
  </div>

  <div class="block">
    <h3>Como a geração funciona</h3>
    <ul class="steps">
      <li><span class="step-num">1</span><div class="step-body"><strong>Semente (seed) determinística:</strong> o mesmo número sempre gera o mesmo glifo. A seed deriva do nome ou idioma da civilização — sem aleatoriedade vazia.</div></li>
      <li><span class="step-num">2</span><div class="step-body"><strong>Grade de 9 nós (3×3):</strong> os traços conectam ou partem desses nós segundo regras que diferem por estilo.</div></li>
      <li><span class="step-num">3</span><div class="step-body"><strong>Palavras:</strong> a função <span class="mono" style="font-family:var(--mono);font-size:11.5px;color:var(--info)">word(style, seed, n)</span> fileira N glifos do mesmo estilo para simular texto.</div></li>
    </ul>
    <div class="annot">Na Biblioteca, cada cultura exibe uma fileira de 8 glifos distintos + uma "palavra" de 5 glifos. Isso dá a sensação de um sistema de escrita completo, mesmo sendo procedural.</div>

function buildWfInfluencia() {
  return `

    <div class="eyebrow">WIREFRAMES · Tela de Influência</div>
    <h2>Tela de Influência</h2>
    <p>O coração mecânico do jogo — materializa "influência, não controle". Três alavancas, todas indiretas e pagas em Atenção. Nenhuma tem efeito fixo: tudo passa pelo filtro cultural.</p>
    <div class="refs">GDD §5 · AA §5.1 · M12</div>
  </div>

  <div class="block">
    <h3>As 3 alavancas de influência</h3>
    <div class="card-grid c3">
      <div class="card">
        <span class="card-tag tag-assets">Alavanca 1</span>

function buildGlossario() {
  return `
  <div class="sec-head">
    <div class="eyebrow">REFERÊNCIA</div>
    <h2>Glossário de siglas</h2>
    <p>Siglas usadas nas eyebrows, notas e referências de ambas as ferramentas. Todos os documentos-fonte estão na pasta <span class="mono" style="font-family:var(--mono);font-size:11.5px;color:var(--info)">docs/</span> do projeto.</p>
  </div>

  <div class="block">
    <h3>Documentos-fonte</h3>
    ${[
      { k:'GDD', v:'<strong>Game Design Document</strong> — documento principal de design do jogo. Define mecânicas, sistemas, história, progressão e pilares de design. Seções referenciadas como §1, §2, etc.' },
      { k:'AA', v:'<strong>Catálogo de Assets</strong> — lista completa de assets visuais que precisam existir, organizados por família e prioridade. A Biblioteca de Assets implementa o que o AA especifica.' },
      { k:'DV', v:'<strong>Documento de Design Visual</strong> — direção de arte do projeto. Define paleta, tipografia, estilo visual, tom e diretrizes de composição.' },
      { k:'M01–M14', v:'<strong>Documentos de Mecânica</strong> — cada mecânica tem seu próprio documento com especificação exaustiva. Referenciados no GDD com o número correspondente.' },
    ].map(g => `<div class="gloss-row"><div class="gloss-key">${g.k}</div><div class="gloss-val">${g.v}</div></div>`).join('')}
  </div>

  <div class="block">
    <h3>Prioridades de entrega</h3>
    ${[
      { k:'P0', v:'<strong>Crítico</strong> — necessário para o primeiro build jogável. Sem isso, o jogo não funciona.' },
      { k:'P1', v:'<strong>Alta prioridade</strong> — necessário para o vertical slice / demo. O jogo fica incompleto sem.' },
      { k:'P2', v:'<strong>Complementar</strong> — aprofunda a experiência mas pode ser entregue após o primeiro marco.' },
    ].map(g => `<div class="gloss-row"><div class="gloss-key">${g.k}</div><div class="gloss-val">${g.v}</div></div>`).join('')}
  </div>

  <div class="block">
    <h3>Termos técnicos frequentes</h3>
    <table class="feat-table">
      <thead><tr><th>Termo</th><th>Significado no contexto de Gênese</th></tr></thead>
      <tbody>
        <tr><td>9-slice</td><td>Técnica de stretching de sprites onde as bordas são fixas e o centro escala — garante que molduras mantenham as curvas independente do tamanho.</td></tr>
        <tr><td>Rampa semântica</td><td>Gradiente de cor com significado fixo (ex: verde claro = pouca vida, verde escuro = muita vida). Sempre a mesma rampa para a mesma estatística em todo o jogo.</td></tr>
        <tr><td>Genoma</td><td>O conjunto de parâmetros que define uma criatura (forma, textura, cor, apêndices, etc.). Determinístico — o mesmo genoma sempre gera a mesma aparência.</td></tr>
        <tr><td>Figura notável</td><td>Indivíduo excepcional que atinge papel de destaque na civilização (profeta, inventor, tirano). Suas ações têm consequências desproporcionar ao seu tamanho.</td></tr>
        <tr><td>Nudge</td><td>Intervenção pontual do jogador no mundo — estímulo interpretado pela civilização segundo seus valores culturais. Nunca tem efeito garantido.</td></tr>
        <tr><td>Atenção</td><td>O recurso central do jogador — regenera devagar, é gasto em nudges e pressão ambiental, e cresce conforme a civilização "acredita" na presença do jogador.</td></tr>
        <tr><td>Especiação</td><td>Processo pelo qual uma população se divide em duas espécies visualmente e biologicamente distintas por deriva genética e adaptação ambiental.</td></tr>
        <tr><td>currentColor</td><td>Palavra-chave CSS/SVG que herda a cor do elemento pai. Usada nos ícones para permitir tingimento em runtime com uma única cópia do asset.</td></tr>
      </tbody>
    </table>
  </div>

  <div class="foot">GÊNESE · Documentação das Ferramentas · v1.0 · Junho 2026<br>
  Fonte de verdade: GDD v0.1 · Design Visual (DV) · Catálogo de Assets (AA).<br>
  Esta documentação descreve o estado atual das ferramentas — atualizar sempre que uma nova seção ou comportamento for adicionado.</div>`;
}

  'wf-influencia': buildWfInfluencia,
  'wf-civ': buildWfCiv,
  'wf-ficha': buildWfFicha,
  'wf-codice': buildWfCodice,
  'wf-mapa': buildWfMapa,
  'wf-cronica': buildWfCronica,
  'wf-assets': buildWfAssets,
  'wf-meta': buildWfMeta,
  glossario: buildGlossario,
};

function buildNav() {
  const groups = {};
  SECTIONS.forEach(s => { (groups[s.group] = groups[s.group] || []).push(s); });
  const rail = document.getElementById('rail');
  let h = `<h1>Gênese</h1><div class="sub">Documentação</div>`;
  Object.keys(groups).forEach(g => {
    h += `<span class="grp-label">${g}</span>`;
    groups[g].forEach((s, i) => {
      h += `<button class="nav-item" data-id="${s.id}">
        <span class="dot" style="background:${s.dot}"></span>${s.title}
        <span class="num">${String(SECTIONS.indexOf(s) + 1).padStart(2, '0')}</span>
      </button>`;
    });
  });
  rail.innerHTML = h;
  rail.querySelectorAll('.nav-item').forEach(b => b.addEventListener('click', () => { location.hash = b.dataset.id; }));

  const sel = document.getElementById('mobileSel');
  sel.innerHTML = Object.keys(groups).map(g =>
    `<optgroup label="${g}">` + groups[g].map(s => `<option value="${s.id}">${s.title}</option>`).join('') + `</optgroup>`
  ).join('');
  sel.addEventListener('change', () => { location.hash = sel.value; });
}

function render() {
  const id = location.hash.replace('#', '') || SECTIONS[0].id;
  const s = byId[id] || SECTIONS[0];
  const fn = BUILDERS[s.id];
  document.getElementById('stage').innerHTML = `<div class="sec">${fn ? fn() : '<p>Seção não encontrada.</p>'}</div>`;
  window.scrollTo(0, 0);
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.id === s.id));
  const sel = document.getElementById('mobileSel');
  if (sel) sel.value = s.id;
}

buildNav();
window.addEventListener('hashchange', render);
render();
</script>
</body>
</html>
